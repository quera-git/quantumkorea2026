server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅: 정적 자산이 없으면 index.html로 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 자산 캐시
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
